<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOO - Obra Rose</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Tópicos da reunião">
      <div class="brand">
        <svg viewBox="0 0 64 64" role="img" aria-label="SOO" class="brand-mark">
          <rect x="8" y="10" width="48" height="44" rx="5"></rect>
          <path d="M18 24h28M18 33h28M18 42h18"></path>
          <path d="M44 14v8M20 14v8"></path>
        </svg>
        <div>
          <strong>SOO</strong>
          <span>Sistema Operacional de Obras</span>
        </div>
      </div>
      <nav id="topicTabs" class="tabs"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Obra Rose</p>
          <h1 id="sectionTitle">Reunião Pedreiro/Azulejista</h1>
        </div>
        <div class="actions">
          <button id="clearSection" class="button secondary" type="button" title="Limpar tópico atual">Limpar tópico</button>
          <button id="exportPdf" class="button primary" type="button" title="Exportar reunião em PDF">Exportar PDF</button>
        </div>
      </header>

      <section class="sheet screen-sheet">
        <form id="meetingForm" autocomplete="off">
          <section class="field-band" aria-labelledby="dadosReuniao">
            <h2 id="dadosReuniao">Tela inicial da reunião</h2>
            <div class="form-grid">
              <label>Obra
                <input data-store="meta.obra" type="text" value="Apartamento Rose">
              </label>
              <label>Tipo de reunião
                <input data-store="meta.tipo" type="text" value="Pedreiro / Azulejista">
              </label>
              <label>Data
                <input data-store="meta.data" type="date">
              </label>
              <label class="span-2">Participantes
                <textarea data-store="meta.participantes" rows="2" placeholder="Liste os participantes da reunião"></textarea>
              </label>
              <label class="span-2">Objetivo da reunião
                <textarea data-store="meta.objetivo" rows="3">Definir soluções técnicas para revestimento da cozinha, proteção das portas laqueadas, piso e drenagem do terraço, nicho da adega e localização dos pontos da banheira.</textarea>
              </label>
            </div>
          </section>

          <section class="checklist-section">
            <div class="section-head">
              <div>
                <h2 id="checklistHeading">Cozinha - revestimento sobre revestimento</h2>
                <p id="checklistHint">Validação técnica do assentamento sobre o revestimento existente.</p>
              </div>
              <span id="completionBadge" class="badge">0/0</span>
            </div>

            <div class="table-wrap">
              <table class="checklist-table">
                <thead>
                  <tr>
                    <th scope="col">Item</th>
                    <th scope="col">Sim</th>
                    <th scope="col">Não</th>
                    <th scope="col">N.A.</th>
                    <th scope="col">Observações</th>
                  </tr>
                </thead>
                <tbody id="checklistBody"></tbody>
              </table>
            </div>
          </section>

          <section class="notes-grid topic-notes" aria-label="Fechamento do tópico">
            <label>Decisão final
              <textarea data-section-field="decisaoFinal" rows="3" placeholder="Solução aprovada para este tópico"></textarea>
            </label>
            <label>Pendência
              <textarea data-section-field="pendencia" rows="3" placeholder="Pendência aberta, se houver"></textarea>
            </label>
            <label>Responsável
              <input data-section-field="responsavel" type="text" placeholder="Responsável pelo encaminhamento">
            </label>
            <label>Prazo
              <input data-section-field="prazo" type="text" placeholder="Data ou prazo combinado">
            </label>
            <label class="span-2">Fotos necessárias
              <textarea data-section-field="fotosNecessarias" rows="3" placeholder="Fotos antes, durante ou depois da execução"></textarea>
            </label>
          </section>
        </form>
      </section>

      <section id="printAll" class="print-all" aria-label="Versão para PDF"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
